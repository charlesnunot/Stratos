<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratos Web</title>

  <!-- Link to external styles.css -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Optionally, you can include FontAwesome if needed for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="brand">Stratos</div>
    <button>Home</button>
    <button>Search</button>
    <button>Explore</button>
    <button>Marketplace</button>
    <button>Create</button>
    <button>Messages</button>

    <!-- More Button -->
    <div class="more-button" id="more-button">
      <i class="fas fa-bars"></i> More
    </div>

    <!-- More Menu -->
    <div class="more-menu" id="more-menu">
      <a href="settings.html" id="settings"><i class="fas fa-cogs"></i> Settings</a>
      <a href="#" id="report-issue"><i class="fas fa-exclamation-circle"></i> Report Issue</a>
      <a href="#" id="switch-account"><i class="fas fa-sync-alt"></i> Switch Account</a>
      <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel" id="right-panel">
    <div class="app-download">
      <h3>Download Stratos App</h3>
      <button>iOS</button>
      <button>Android</button>
    </div>
    <div class="user-info" id="user-info" style="display:none;">
      <img id="user-avatar" src="https://via.placeholder.com/60" alt="User Avatar">
      <span id="username"></span>
      <div class="notifications">
        <p>New message: User C commented on your post</p>
        <p>Friend online: User D</p>
        <p>System notification: Event starting soon</p>
      </div>
      <button id="logout-btn">Logout</button>
    </div>
  </div>

   <script src="js/sidebar.js"></script>

</body>
</html>
