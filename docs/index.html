  <link rel="stylesheet" href="css/styles.css">

<body>

  <!-- Include sidebar and right panel -->
  <div id="sidebar-right-panel-container">

  <!-- Center content -->
  <div class="center-container">
    <div class="main-content">
      <h1>Home Feed</h1>
      <div class="post">
        <h3>User A's Post</h3>
        <p>Sample content...</p>
      </div>
      <div class="post">
        <h3>User B's Post</h3>
        <p>Sample content...</p>
      </div>
    </div>
  </div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- 引入自定义 auth.js -->
  <script src="js/auth.js"></script>
