<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratos Web Homepage</title>
<link rel="stylesheet" href="css/styles.css">
<style>
body { font-family: Arial, sans-serif; margin:0; display:flex; }
.sidebar { width:200px; background:#eee; padding:10px; }
.center-container { flex:1; padding:10px; }
.right-panel { width:250px; background:#f5f5f5; padding:10px; }
.modal-mask { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; }
.modal { background:#fff; padding:20px; border-radius:8px; }
.user-info { display:flex; flex-direction:column; align-items:center; }
.user-info img { border-radius:50%; margin-bottom:10px; }
</style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">Stratos</div>
    <button>Home</button>
    <button>Search</button>
    <button>Explore</button>
    <button>Marketplace</button>
    <button>Create</button>
    <button>Messages</button>
  </div>

  <!-- Center content -->
  <div class="center-container">
    <div class="main-content">
      <h1>Home Feed</h1>
      <div class="post"><h3>User A's Post</h3><p>Sample content...</p></div>
      <div class="post"><h3>User B's Post</h3><p>Sample content...</p></div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel" id="right-panel">
    <div class="app-download">
      <h3>Download Stratos App</h3>
      <button>iOS</button>
      <button>Android</button>
    </div>
    <div class="user-info" id="user-info" style="display:none;">
      <img src="https://via.placeholder.com/60" alt="User Avatar">
      <span id="username"></span>
      <div class="notifications">
        <p>New message: User C commented on your post</p>
        <p>Friend online: User D</p>
        <p>System notification: Event starting soon</p>
      </div>
      <button id="logout-btn">Logout</button>
    </div>
  </div>

  <!-- 模态遮罩 -->
  <div class="modal-mask" id="modal-mask" style="display:none;">
    <!-- 登录模态 -->
    <div class="modal" id="login-modal">
      <h2>Login</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required autocomplete="email">
        <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
        <button type="submit" id="login-btn">Login</button>
      </form>
      <span class="switch-mode" id="to-register">Don't have an account? Register</span>
    </div>

    <!-- 注册模态 -->
    <div class="modal" id="register-modal" style="display:none;">
      <h2>Register</h2>
      <form id="register-form">
        <input type="email" id="register-email" placeholder="Email" required autocomplete="email">
        <input type="password" id="register-password" placeholder="Password" required autocomplete="new-password">
        <button type="submit" id="register-btn">Register</button>
      </form>
      <span class="switch-mode" id="to-login">Already have an account? Login</span>
    </div>
  </div>

  <!-- 先加载 Supabase SDK，再加载自定义 auth.js -->
  <script src="js/supabase.min.js"></script> <!-- 下载到本地避免被浏览器阻止 -->
  <script src="js/auth.js"></script>

</body>
</html>
