<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratos Web Homepage</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">Stratos</div>
    <button>Home</button>
    <button>Search</button>
    <button>Explore</button>
    <button>Marketplace</button>
    <button>Create</button>
    <button>Messages</button>
  </div>

  <!-- Center content -->
  <div class="center-container">
    <div class="main-content">
      <h1>Home Feed</h1>
      <div class="post"><h3>User A's Post</h3><p>Sample content...</p></div>
      <div class="post"><h3>User B's Post</h3><p>Sample content...</p></div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel" id="right-panel">
    <div class="app-download">
      <h3>Download Stratos App</h3>
      <button>iOS</button>
      <button>Android</button>
    </div>
    <div class="user-info" id="user-info" style="display:none;">
      <img src="https://via.placeholder.com/60" alt="User Avatar">
      <span id="username"></span>
      <div class="notifications">
        <p>New message: User C commented on your post</p>
        <p>Friend online: User D</p>
        <p>System notification: Event starting soon</p>
      </div>
    </div>
  </div>

  <!-- жЁЎжЂЃйЃ®зЅ© -->
  <div class="modal-mask" id="modal-mask" style="display:none;">
    <!-- з™»еЅ•жЁЎжЂЃ -->
    <div class="modal" id="login-modal">
      <h2>Login</h2>
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-password" placeholder="Password">
      <button id="login-btn">Login</button>
      <span class="switch-mode" id="to-register">Don't have an account? Register</span>
    </div>

    <!-- жіЁе†ЊжЁЎжЂЃ -->
    <div class="modal" id="register-modal" style="display:none;">
      <h2>Register</h2>
      <input type="email" id="register-email" placeholder="Email">
      <input type="password" id="register-password" placeholder="Password">
      <button id="register-btn">Register</button>
      <span class="switch-mode" id="to-login">Already have an account? Login</span>
    </div>
  </div>

  <!-- ====== Supabase JS ====== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>

  <!-- ====== Auth JS ====== -->
  <script src="js/auth.js"></script>
</body>
</html>
