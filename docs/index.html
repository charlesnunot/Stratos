<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratos Web Homepage</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <!-- Main container wrapping sidebar, center content, and right panel -->
  <div id="main-container">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Vertical Divider (Left) -->
    <div class="vertical-divider"></div>

    <!-- Center content -->
    <div class="center-container">
      <div class="main-content">
        <h1>Home Feed</h1>
        <div class="post">
          <h3>User A's Post</h3>
          <p>Sample content...</p>
        </div>
        <div class="post">
          <h3>User B's Post</h3>
          <p>Sample content...</p>
        </div>
      </div>
    </div>

    <!-- Vertical Divider (Right) -->
    <div class="vertical-divider"></div>

    <!-- Right Panel -->
    <div id="right-panel-container"></div>
  </div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Custom Auth Script -->
  <script src="js/auth.js"></script>

  <script>
    // Load Sidebar and Right Panel
    function loadSidebarAndRightPanel() {
      // Load Sidebar
      fetch('sidebar.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('sidebar-container').innerHTML = data;
        })
        .catch(error => {
          console.error('Error loading sidebar:', error);
        });

      // Load Right Panel
      fetch('right-panel.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('right-panel-container').innerHTML = data;
        })
        .catch(error => {
          console.error('Error loading right panel:', error);
        });
    }

    // Call function to load sidebar and right panel when the page loads
    window.onload = loadSidebarAndRightPanel;
  </script>

</body>
</html>
