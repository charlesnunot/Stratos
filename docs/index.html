<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratos Web Homepage</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="auth.css">
<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">Stratos</div>
    <button><ion-icon name="home-outline"></ion-icon><span>Home</span></button>
    <button><ion-icon name="search-outline"></ion-icon><span>Search</span></button>
    <button><ion-icon name="compass-outline"></ion-icon><span>Explore</span></button>
  </div>

  <!-- Center content -->
  <div class="center-container">
    <div class="main-content">
      <h1>Home Feed</h1>
      <div class="post"><h3>User A</h3><p>Sample content...</p></div>
      <div class="post"><h3>User B</h3><p>Sample content...</p></div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel" id="right-panel">
    <div class="app-download">
      <h3>Download Stratos App</h3>
      <button>iOS</button>
      <button>Android</button>
    </div>
    <div id="user-info" style="display:none;">
      <div class="user-info">
        <img src="https://via.placeholder.com/60" alt="User Avatar">
        <span id="username"></span>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
