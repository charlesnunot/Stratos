<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratos Web Homepage</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <!-- Main container wrapping sidebar, center content, and right panel -->
  <div id="main-container">
    <div id="sidebar-container"></div>
    <div class="vertical-divider"></div>

    <div class="center-container">
      <div class="main-content">
        <h1>Home Feed</h1>
        <div class="post"><h3>User A's Post</h3><p>Sample content...</p></div>
        <div class="post"><h3>User B's Post</h3><p>Sample content...</p></div>
      </div>
    </div>

    <div class="vertical-divider"></div>
    <div id="right-panel-container"></div>
  </div>

  <!-- 模态遮罩 -->
  <div class="modal-mask" id="modal-mask" style="display:none;">
    <div class="modal" id="login-modal">
      <h2>Login</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required autocomplete="username">
        <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
        <button type="submit" id="login-btn">Login</button>
      </form>
      <span class="switch-mode" id="to-register">Don't have an account? Register</span>
    </div>

    <div class="modal" id="register-modal" style="display:none;">
      <h2>Register</h2>
      <form id="register-form">
        <input type="email" id="register-email" placeholder="Email" required autocomplete="username">
        <input type="password" id="register-password" placeholder="Password" required autocomplete="new-password">
        <button type="submit" id="register-btn">Register</button>
      </form>
      <div id="register-message" style="color:green; margin-top:8px; display:none;"></div>
      <span class="switch-mode" id="to-login">Already have an account? Login</span>
    </div>

    <div class="modal" id="email-verification-modal" style="display:none;">
      <h2>Email Verification Required</h2>
      <p>Please check your email for the verification link before logging in.</p>
      <button id="go-to-login">Go to Login</button>
    </div>
  </div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- 主逻辑脚本 -->
  <script>
    async function loadSidebarAndRightPanel() {
      try {
        // 加载 sidebar
        const sidebarResp = await fetch('sidebar.html');
        document.getElementById('sidebar-container').innerHTML = await sidebarResp.text();

        // 加载 right-panel
        const rightResp = await fetch('right-panel.html');
        document.getElementById('right-panel-container').innerHTML = await rightResp.text();

        // right-panel 加载完成后再初始化 auth
        initAuth();

      } catch (err) {
        console.error('加载 Sidebar 或 Right Panel 出错:', err);
      }
    }

    // 将原来的 auth.js 包装成 initAuth
    function initAuth() {
      console.log("initAuth 执行");

      const modalMask = document.getElementById('modal-mask');
      const loginModal = document.getElementById('login-modal');
      const registerModal = document.getElementById('register-modal');
      const usernameEl = document.getElementById('username');
      const userInfo = document.getElementById('user-info');
      const emailVerificationModal = document.getElementById('email-verification-modal');

      if (!usernameEl || !userInfo) {
        console.error("必要元素未找到，initAuth 停止执行");
        return;
      }

      function saveToken(token) { localStorage.setItem('authToken', token); }
      function getToken() { return localStorage.getItem('authToken'); }
      function clearToken() { 
        localStorage.removeItem('authToken'); 
        localStorage.removeItem('username'); 
      }

      const SUPABASE_URL = 'https://zquslphbmowkgrdlygza.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_oaojowgzWjzLUAUhA7rjfw_hntjdrcu';
      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      async function getUserProfile(uid) {
        const { data, error } = await supabaseClient.from('user_profiles').select('*').eq('uid', uid).maybeSingle();
        if (error) return null;
        return data;
      }

      const generateDefaultNickname = (email) => {
        if (!email || !email.includes('@')) return '新用户_' + Math.floor(Math.random() * 10000);
        const prefix = email.split('@')[0];
        const firstPart = prefix.slice(0, 5);
        const lastChar = prefix.slice(-1);
        const randomNum = Math.floor(1000 + Math.random() * 9000);
        return `${firstPart}${randomNum}${lastChar}`;
      };

      async function upsertUserProfile(profile) {
        const { data, error } = await supabaseClient.from('user_profiles').upsert(profile, { onConflict: 'uid' }).select('*').maybeSingle();
        return data || null;
      }

      async function getUserAvatar(uid) {
        try {
          const { data, error } = await supabaseClient.from('user_avatars').select('avatar_url').eq('uid', uid).single();
          if (error || !data) return 'https://res.cloudinary.com/dpgkgtb5n/image/upload/v1763533800/n0ennkuiissnlhyhtht8.jpg';
          return data.avatar_url;
        } catch {
          return 'https://res.cloudinary.com/dpgkgtb5n/image/upload/v1763533800/n0ennkuiissnlhyhtht8.jpg';
        }
      }

      function showUser(nickname, avatarUrl) {
        usernameEl.textContent = nickname;
        const avatarEl = document.getElementById('user-avatar');
        if (avatarEl) avatarEl.src = avatarUrl;
        userInfo.style.display = 'flex';
        modalMask.style.display = 'none';
        registerModal.style.display = 'none';
      }

      const token = getToken();
      const username = localStorage.getItem('username');
      if (!token || !username) {
        modalMask.style.display = 'flex';
        loginModal.style.display = 'flex';
        registerModal.style.display = 'none';
        userInfo.style.display = 'none';
      } else showUser(username);

      // ===== 登录 =====
      document.getElementById('login-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const { data: sessionData, error: loginError } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (loginError) { alert(loginError.message); return; }
        saveToken(sessionData?.access_token || '');
        localStorage.setItem('username', email);

        const user = sessionData.user;
        const userProfile = await getUserProfile(user.id);
        let nickname = userProfile?.nickname || generateDefaultNickname(user.email);
        if (!userProfile) await upsertUserProfile({ uid: user.id, nickname });

        const avatarUrl = await getUserAvatar(user.id);
        showUser(nickname, avatarUrl);
      });

      // ===== 注册 =====
      document.getElementById('register-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        const messageEl = document.getElementById('register-message');
        messageEl.style.display = 'none';
        messageEl.textContent = '';
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) { messageEl.style.color='red'; messageEl.textContent=error.message; messageEl.style.display='block'; return; }
        emailVerificationModal.style.display='flex';
        modalMask.style.display='flex';
        registerModal.style.display='none';
      });

      // ===== 切换弹窗 =====
      document.getElementById('to-register')?.addEventListener('click', () => { loginModal.style.display='none'; registerModal.style.display='flex'; });
      document.getElementById('to-login')?.addEventListener('click', () => { registerModal.style.display='none'; loginModal.style.display='flex'; });
      document.getElementById('go-to-login')?.addEventListener('click', () => { emailVerificationModal.style.display='none'; loginModal.style.display='flex'; });
    }

    // 页面加载时调用
    window.onload = loadSidebarAndRightPanel;
  </script>

</body>
</html>
