<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram 样式页面</title>
<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    height: 100vh;
  }

  /* 左侧导航栏 */
  #sidebar {
    width: 60px;
    background: #fff;
    border-right: 1px solid #ccc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
  }

  #sidebar button {
    background: none;
    border: none;
    margin: 10px 0;
    cursor: pointer;
    font-size: 24px;
  }

  /* 右侧最宽内容栏 */
  #content {
    flex: 1;
    background: #f9f9f9;
    padding: 20px;
    overflow-y: auto;
  }

  .panel-section {
    display: none;
  }

  .panel-section.active {
    display: block;
  }

  /* 用户栏示例 */
  .user-card {
    background: #fff;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-card img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
  }

  .user-card .text {
    display: flex;
    flex-direction: column;
  }

  .user-card .text span {
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="sidebar">
  <button data-panel="home-panel">🏠</button>
  <button data-panel="search-panel">🔍</button>
  <button data-panel="explore-panel">🧭</button>
  <button data-panel="reels-panel">🎬</button>
  <button data-panel="messages-panel">✉️</button>
  <button data-panel="likes-panel">❤️</button>
  <button data-panel="add-panel">➕</button>
  <button data-panel="stats-panel">📊</button>
</div>

<div id="content">
  <div id="home-panel" class="panel-section active">
    <div class="user-card">
      <img src="527a4911-904d-424f-846f-9e01bee7c7b4.png" alt="用户头像">
      <div class="text">
        <span>你的便签</span>
        <small>点击左边图标切换内容</small>
      </div>
    </div>
  </div>
  <div id="search-panel" class="panel-section">搜索内容区域</div>
  <div id="explore-panel" class="panel-section">探索内容区域</div>
  <div id="reels-panel" class="panel-section">Reels 内容区域</div>
  <div id="messages-panel" class="panel-section">消息内容区域</div>
  <div id="likes-panel" class="panel-section">喜欢内容区域</div>
  <div id="add-panel" class="panel-section">添加内容区域</div>
  <div id="stats-panel" class="panel-section">分析内容区域</div>
</div>

<script>
  const buttons = document.querySelectorAll('#sidebar button');
  const panels = document.querySelectorAll('.panel-section');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.getAttribute('data-panel');
      panels.forEach(panel => {
        panel.classList.remove('active');
        if (panel.id === target) {
          panel.classList.add('active');
        }
      });
    });
  });
</script>

</body>
</html>
