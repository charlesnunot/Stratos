<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社交平台三列布局</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 左侧工具栏 -->
<div id="toolbar">
  <button data-panel="panel1">🏠</button>
  <button data-panel="panel2">🔍</button>
  <button data-panel="panel3">🧭</button>
</div>

<!-- 左侧工具栏和中间面板分隔线 -->
<div class="divider"></div>

<!-- 中间动态面板 -->
<div id="dynamic-panel">
  <div id="panel1" class="panel-section active">面板 1 内容</div>
  <div id="panel2" class="panel-section">面板 2 内容</div>
  <div id="panel3" class="panel-section">面板 3 内容</div>
</div>

<!-- 中间动态面板和右侧内容的分隔线 -->
<div class="divider"></div>

<!-- 最右宽内容面板 -->
<div id="main-content">
  <div class="user-card">
    <img src="527a4911-904d-424f-846f-9e01bee7c7b4.png" alt="用户头像">
    <div class="text">
      <span>最右宽内容面板</span>
      <small>这里始终显示固定内容</small>
    </div>
  </div>
  <p>这里可以放大量内容，比如帖子列表、文章内容、统计数据等。</p>
</div>

<script src="js/script.js"></script>
</body>
</html>
