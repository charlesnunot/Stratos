<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三列布局示例 - 可拖动</title>
<style>
  /* 全局 */
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: #fff;
    overflow: hidden;
  }

  /* 左侧工具栏 */
  #toolbar {
    width: 60px;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
    flex-shrink: 0; /* 防止被压缩 */
  }

  #toolbar button {
    background: none;
    border: none;
    margin: 10px 0;
    cursor: pointer;
    font-size: 24px;
  }

  /* 分隔线 / 可拖动 */
  .divider {
    width: 1px;
    min-width: 1px;
    background: #ccc; /* 和工具栏边线一致 */
    cursor: col-resize;
    flex-shrink: 0; /* 防止被压缩 */
  }

  /* 中间动态面板 */
  #dynamic-panel {
    width: 300px;
    background: #fff;
    overflow-y: auto;
    flex-shrink: 0; /* 防止被压缩 */
  }

  .panel-section {
    display: none;
    padding: 20px;
  }

  .panel-section.active {
    display: block;
  }

  /* 最右宽内容面板 */
  #main-content {
    flex: 1;
    background: #fff;
    padding: 20px;
    overflow-y: auto;
  }

  /* 用户卡片 */
  .user-card {
    background: #fff;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid #ccc;
  }

  .user-card img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
  }

  .user-card .text {
    display: flex;
    flex-direction: column;
  }

  .user-card .text span {
    font-weight: bold;
  }
</style>
</head>
<body>

<!-- 左侧工具栏 -->
<div id="toolbar">
  <button data-panel="panel1">🏠</button>
  <button data-panel="panel2">🔍</button>
  <button data-panel="panel3">🧭</button>
</div>

<!-- 左侧工具栏和动态面板的分隔线 -->
<div class="divider"></div>

<!-- 中间动态面板 -->
<div id="dynamic-panel">
  <div id="panel1" class="panel-section active">面板 1 内容</div>
  <div id="panel2" class="panel-section">面板 2 内容</div>
  <div id="panel3" class="panel-section">面板 3 内容</div>
</div>

<!-- 中间动态面板和右侧内容的分隔线 -->
<div class="divider"></div>

<!-- 最右宽内容面板 -->
<div id="main-content">
  <div class="user-card">
    <img src="527a4911-904d-424f-846f-9e01bee7c7b4.png" alt="用户头像">
    <div class="text">
      <span>最右宽内容面板</span>
      <small>这里始终显示固定内容</small>
    </div>
  </div>
  <p>这里可以放大量内容，比如帖子列表、文章内容、统计数据等。</p>
</div>

<script>
  // 面板切换
  const buttons = document.querySelectorAll('#toolbar button');
  const panels = document.querySelectorAll('.panel-section');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.getAttribute('data-panel');
      panels.forEach(panel => {
        panel.classList.remove('active');
        if (panel.id === target) panel.classList.add('active');
      });
    });
  });

  // 左右拖动逻辑
  const dividers = document.querySelectorAll('.divider');
  let isDragging = null;
  let startX, startWidth1, startWidth2;

  dividers.forEach((divider, index) => {
    divider.addEventListener('mousedown', e => {
      isDragging = index;
      startX = e.clientX;
      if (index === 0) {
        startWidth1 = document.getElementById('toolbar').offsetWidth;
        startWidth2 = document.getElementById('dynamic-panel').offsetWidth;
      } else {
        startWidth1 = document.getElementById('dynamic-panel').offsetWidth;
        startWidth2 = document.getElementById('main-content').offsetWidth;
        document.getElementById('main-content').style.flex = 'none';
      }
      document.body.style.cursor = 'col-resize';
      e.preventDefault();
    });
  });

  window.addEventListener('mousemove', e => {
    if (isDragging === null) return;
    const dx = e.clientX - startX;
    if (isDragging === 0) {
      document.getElementById('toolbar').style.width = startWidth1 + dx + 'px';
      document.getElementById('dynamic-panel').style.width = startWidth2 - dx + 'px';
    } else {
      document.getElementById('dynamic-panel').style.width = startWidth1 + dx + 'px';
      document.getElementById('main-content').style.width = startWidth2 - dx + 'px';
    }
  });

  window.addEventListener('mouseup', e => {
    isDragging = null;
    document.body.style.cursor = 'default';
  });
</script>

</body>
</html>
