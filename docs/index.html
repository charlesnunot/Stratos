<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三列布局-可拖动面板</title>
<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    height: 100vh;
    user-select: none; /* 拖动时避免选中内容 */
    background-color: #fff; /* 页面整体背景白色 */
  }

  /* 左侧工具栏 */
  #toolbar {
    width: 60px;
    background: #fff;
    border-right: 1px solid #ccc;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0;
  }

  #toolbar button {
    background: none;
    border: none;
    margin: 10px 0;
    cursor: pointer;
    font-size: 24px;
  }

  /* 中间动态面板 */
  #dynamic-panel {
    width: 400px; /* 默认宽度 */
    background: #fff; /* 背景改白色 */
    padding: 20px;
    overflow-y: auto;
    border-right: 2px solid #999; /* 拖动分隔线 */
    position: relative;
  }

  /* 拖动手柄 */
  #drag-handle {
    width: 5px;
    cursor: ew-resize;
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.1);
  }

  .panel-section {
    display: none;
  }

  .panel-section.active {
    display: block;
  }

  /* 最右宽内容面板 */
  #main-content {
    flex: 1;
    background: #fff; /* 背景改白色 */
    padding: 20px;
    overflow-y: auto;
  }

  /* 用户栏示例 */
  .user-card {
    background: #fff; /* 背景改白色 */
    padding: 10px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid #ccc; /* 可选边框增加层次感 */
  }

  .user-card img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
  }

  .user-card .text {
    display: flex;
    flex-direction: column;
  }

  .user-card .text span {
    font-weight: bold;
  }
</style>
</head>
<body>

<!-- 左侧工具栏 -->
<div id="toolbar">
  <button data-panel="panel1">🏠</button>
  <button data-panel="panel2">🔍</button>
  <button data-panel="panel3">🧭</button>
</div>

<!-- 中间动态面板 -->
<div id="dynamic-panel">
  <div id="panel1" class="panel-section active">面板 1 内容</div>
  <div id="panel2" class="panel-section">面板 2 内容</div>
  <div id="panel3" class="panel-section">面板 3 内容</div>

  <!-- 拖动手柄 -->
  <div id="drag-handle"></div>
</div>

<!-- 最右宽内容面板 -->
<div id="main-content">
  <div class="user-card">
    <img src="527a4911-904d-424f-846f-9e01bee7c7b4.png" alt="用户头像">
    <div class="text">
      <span>最右宽内容面板</span>
      <small>这里始终显示固定内容</small>
    </div>
  </div>
  <p>这里可以放大量内容，比如帖子列表、文章内容、统计数据等。</p>
</div>

<script>
  // 面板切换
  const buttons = document.querySelectorAll('#toolbar button');
  const panels = document.querySelectorAll('.panel-section');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.getAttribute('data-panel');
      panels.forEach(panel => {
        panel.classList.remove('active');
        if (panel.id === target) panel.classList.add('active');
      });
    });
  });

  // 拖动改变宽度
  const panel = document.getElementById('dynamic-panel');
  const handle = document.getElementById('drag-handle');

  let isDragging = false;

  handle.addEventListener('mousedown', e => {
    isDragging = true;
    document.body.style.cursor = 'ew-resize';
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const newWidth = e.clientX - panel.getBoundingClientRect().left;
    if (newWidth > 200 && newWidth < 800) { // 限制最小/最大宽度
      panel.style.width = newWidth + 'px';
    }
  });

  document.addEventListener('mouseup', e => {
    if (isDragging) {
      isDragging = false;
      document.body.style.cursor = 'default';
    }
  });
</script>

</body>
</html>
