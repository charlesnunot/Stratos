<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Platform Layout</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<!-- Left Toolbar -->
<div id="toolbar">
  <div class="top-icons">
    <button data-panel="panel-user" title="Home"><span class="material-icons">home</span></button>
    <button data-panel="panel2" title="Search"><span class="material-icons">search</span></button>
    <button data-panel="panel3" title="Explore"><span class="material-icons">explore</span></button>
    <button data-panel="panel4" title="Market"><span class="material-icons">storefront</span></button>
    <button data-panel="panel5" title="Notifications"><span class="material-icons">notifications</span></button>
    <button data-panel="panel6" title="Messages"><span class="material-icons">email</span></button>
    <button data-panel="panel7" title="Add"><span class="material-icons">add_box</span></button>
    <button data-panel="panel8" title="User"><span class="material-icons">person</span></button>
  </div>

  <div class="bottom-icon">
    <button title="More"><span class="material-icons">menu</span></button>
  </div>
</div>

<div class="divider"></div>

<!-- Dynamic Panel -->
<div id="dynamic-panel">

  <!-- User Panel -->
  <div id="panel-user" class="panel-section active">
    <div class="user-header">
      <div class="avatar-column">
        <img src="https://res.cloudinary.com/dpgkgtb5n/image/upload/v1765341478/qllvyqinyhpqwuzny2zr.png"
             alt="User Avatar" class="avatar">
        <div class="status-row">
          <span id="app-status-dot" class="status-dot offline"></span>
          <span id="app-status-text" class="status-text">Offline</span>
        </div>
      </div>
      <div class="nickname">Keyong</div>
    </div>
  </div>

  <div id="panel2" class="panel-section">Search content</div>
  <div id="panel3" class="panel-section">Explore content</div>
  <div id="panel4" class="panel-section">Market content</div>
  <div id="panel5" class="panel-section">Notifications content</div>
  <div id="panel6" class="panel-section">Messages content</div>
  <div id="panel7" class="panel-section">Add content</div>
  <div id="panel8" class="panel-section">User content</div>

</div>

<div class="divider"></div>

<!-- Main Content -->
<div id="main-content">
  <p>Main content area: posts, articles, stats, etc.</p>
</div>

<script type="module" src="js/script.js"></script>
<script type="module" src="js/appStatus.js"></script>
</body>
</html>
