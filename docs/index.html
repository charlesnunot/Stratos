<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratos Web Homepage</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <!-- Sidebar and Right Panel Container -->
  <div id="sidebar-right-panel-container"></div>

  <!-- Center content -->
  <div class="center-container">
    <div class="main-content">
      <h1>Home Feed</h1>
      <div class="post">
        <h3>User A's Post</h3>
        <p>Sample content...</p>
      </div>
      <div class="post">
        <h3>User B's Post</h3>
        <p>Sample content...</p>
      </div>
    </div>
  </div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Custom Auth Script -->
  <script src="js/auth.js"></script>

  <script>
    function loadSidebarRightPanel() {
      fetch('sidebar-right-panel.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('sidebar-right-panel-container').innerHTML = data;
        })
        .catch(error => {
          console.error('Error loading sidebar and right panel:', error);
        });
    }
    window.onload = loadSidebarRightPanel;
  </script>

</body>
</html>
