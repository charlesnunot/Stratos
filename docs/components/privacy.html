<div id="privacy" class="settings-section">
  <h2>Privacy Settings</h2>
  <p class="profile-desc">Manage your privacy options in Stratos.</p>

  <div class="privacy-list card">

    <!-- Do Not Disturb -->
    <div class="privacy-item">
      <span>Do Not Disturb</span>
      <label class="switch">
        <input type="checkbox" id="dnd-toggle">
        <span class="slider round"></span>
      </label>
    </div>

    <!-- Message Notifications -->
    <div class="privacy-item">
      <span>Message Notifications</span>
      <label class="switch">
        <input type="checkbox" id="msg-toggle" checked>
        <span class="slider round"></span>
      </label>
    </div>

    <!-- Minor Protection -->
    <div class="privacy-item">
      <span>Minor Protection</span>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

    <!-- Privacy Policy -->
    <div class="privacy-item">
      <span>Privacy Policy</span>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

    <!-- Stratos Convention -->
    <div class="privacy-item">
      <span>Stratos Convention</span>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

    <!-- Blacklist -->
    <div class="privacy-item" id="blacklist-item">
      <span>Blacklist</span>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

  </div>
</div>
