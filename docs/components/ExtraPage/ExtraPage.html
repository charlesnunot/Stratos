<div id="extra-page">

  <!-- 1️⃣ 注册/登录区 -->
  <section id="auth-section">
    <div class="guest-extra">
      <p class="guest-actions">
        <span id="register-text">Register</span> / 
        <span id="login-text">Login</span>
      </p>
      <p class="guest-note">You are currently not logged in</p>
    </div>
    <div class="user-info" style="display:none">
      <p class="welcome-text">Welcome back, <span id="user-email"></span></p>
      <button id="logout-btn">Log out</button>
    </div>
  </section>

  <!-- 2️⃣ 用户基础数据区 -->
  <section id="user-data-section" style="display:none">
    <div class="user-card">
      <img id="user-avatar" src="" alt="Avatar">
      <p id="user-nickname"></p>
      <div class="user-stats">
        <span id="followers-count">0 Followers</span>
        <span id="score">Score: 0</span>
        <span id="likes">Likes: 0</span>
      </div>
    </div>
  </section>

  <!-- 3️⃣ 系统推送区 -->
  <section id="notifications-section">
    <h3>Recommended for you</h3>
    <div id="notifications-list">
      <!-- 推送卡片列表 -->
    </div>
  </section>

  <!-- 4️⃣ 底部条款 -->
  <section id="footer-section">
    <p class="footer-links">
      <span id="terms-link">Terms</span> | 
      <span id="community-link">Community Guidelines</span> | 
      <span id="privacy-link">Privacy Policy</span>
    </p>
    <p class="footer-copyright">© 2025 YourApp</p>
  </section>

</div>
