<div id="extra-page">

  <!-- 注册/登录区 -->
  <section id="auth-section" class="extra-section">
    <div class="guest-extra">
      <p class="guest-actions">
        <span id="register-text">Register</span> / 
        <span id="login-text">Login</span>
      </p>
      <p class="guest-note">You are currently not logged in</p>
    </div>

    <div class="user-info" style="display:none">
      <p class="welcome-text">Welcome back, <span id="user-email"></span></p>
      <button id="logout-btn">Log out</button>
    </div>
  </section>

  <!-- 用户基础数据区 -->
  <section id="user-data-section" class="extra-section" style="display:none">
    <h3>User Info</h3>
    <div class="user-data">
      <img class="avatar" src="https://via.placeholder.com/60" alt="avatar">
      <p class="nickname">Nickname</p>
      <p class="score">Score: 0</p>
      <p class="followers">Followers: 0</p>
      <p class="likes">Likes: 0</p>
    </div>
  </section>

  <!-- 系统推送区 -->
  <section id="system-feed-section" class="extra-section">
    <h3>Recommended for you</h3>
    <ul class="feed-list">
      <li>Post 1</li>
      <li>Post 2</li>
      <li>Post 3</li>
    </ul>
  </section>

  <!-- 底部条款/版权 -->
  <section id="footer-section" class="extra-section">
    <p>
      <span class="policy-link" data-policy="Terms">Terms</span> | 
      <span class="policy-link" data-policy="Community">Community Guidelines</span> | 
      <span class="policy-link" data-policy="Privacy">Privacy Policy</span>
    </p>
    <p class="copyright">&copy; 2025 MyApp</p>
  </section>

</div>
