<div class="post-modal" style="display:none;">
  <div class="modal-container">
    <!-- 左侧图片 -->
    <div class="modal-left">
      <div class="modal-images-wrapper">
        <button class="carousel-prev">‹</button>
        <div class="modal-images"></div>
        <button class="carousel-next">›</button>
      </div>
    </div>

    <!-- 右侧帖子信息 -->
    <div class="modal-right">
      <div class="modal-header">
        <img class="author-avatar" src="" alt="avatar">
        <span class="author-name"></span>
      </div>
      <div class="modal-content-wrapper">
        <h3 class="modal-title"></h3>
        <p class="modal-content"></p>
      </div>
      <div class="modal-actions">
        <div class="action favorite">❤ <span class="count">0</span></div>
        <div class="action comment">💬 <span class="count">0</span></div>
        <div class="action share">↗ <span class="count">0</span></div>
      </div>
    </div>
  </div>
</div>
