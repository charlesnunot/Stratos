<div id="subscription" class="settings-section">
  <h2>Subscription</h2>
  <p class="profile-desc">Choose a subscription plan that fits your needs.</p>

  <div class="subscription-cards">

    <!-- 订阅卡片1 -->
    <div class="subscription-card" data-plan="basic">
      <div class="card-content">
        <div class="price">$4.99 / Month</div>
        <ul class="features">
          <li>Post up to 100 products listings per month</li>
          <li>Add external links</li>
          <li>Negotiate transactions freely</li>
        </ul>
      </div>
      <div class="check-icon"><i class="fas fa-check"></i></div>
    </div>

    <!-- 订阅卡片2 -->
    <div class="subscription-card" data-plan="premium">
      <div class="card-content">
        <div class="price">$8.99 / Month</div>
        <ul class="features">
          <li>Post up to 500 products listings per month</li>
          <li>Add external links</li>
          <li>Negotiate transactions freely</li>
        </ul>
      </div>
      <div class="check-icon"><i class="fas fa-check"></i></div>
    </div>

  </div>

  <button id="subscribe-btn" class="subscribe-btn">Subscribe</button>
</div>
