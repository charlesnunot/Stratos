<div class="right-panel">

  <!-- 顶部用户信息 -->
  <div class="user-info-row">
    <div class="avatar-wrapper" id="avatar-click-area">
      <img src="https://via.placeholder.com/60" alt="User Avatar" id="user-avatar">
    </div>
    <div class="user-details">
      <span class="nickname" id="username">Loading...</span>
      <span class="app-status" id="app-status-text">
        <span class="status-dot" id="app-status-dot"></span>
        Checking App status...
      </span>
    </div>
  </div>

  <!-- 底部操作 -->
  <div class="bottom-actions">
    <button id="logout-btn" class="text-btn">Logout</button>
    <div class="download-links">
      <span>Download Stratos App:</span>
      <button class="text-btn">iOS</button>
      <button class="text-btn">Android</button>
    </div>
  </div>

</div>
