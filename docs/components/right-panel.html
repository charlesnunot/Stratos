<!-- Stratos/docs/components/right-panel.html-->
<link rel="stylesheet" href="css/right-panel.css">
<link rel="stylesheet" href="css/system-messages.css">

<div class="right-panel" id="right-panel">
  <div class="app-download">
    <h3>Download Stratos App</h3>
    <button>iOS</button>
    <button>Android</button>
  </div>

  <div class="user-info" id="user-info" style="display:none;">
    <div class="user-avatar-wrapper" id="avatar-click-area">
      <img id="user-avatar" src="https://via.placeholder.com/60" alt="User Avatar">
      <input type="file" id="avatar-file" accept="image/*" style="display:none;">
    </div>
    <div id="username" class="user-nickname"></div>
    <!-- App 在线状态 -->
    <div id="app-status" class="app-status">
      <span id="app-status-dot" class="status-dot"></span>
      <span id="app-status-text">Checking App status...</span>
    </div>
    <div id="app-device-status"></div>
    <!-- Profile Modal -->
    <div class="profile-modal" id="profile-modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Edit Profile</h3>
          <span id="profile-close" class="modal-close">&times;</span>
        </div>
    
        <div class="modal-body">
          <div class="profile-avatar-wrapper">
            <img id="profile-avatar" src="https://via.placeholder.com/80" alt="Avatar">
          </div>
          <div class="profile-nickname-display" id="profile-nickname-display">Nickname</div>
    
          <input type="text" id="profile-nickname-input" placeholder="Enter your nickname">
    
          <p class="profile-hint">
            Please avoid using unusual capitalization, punctuation, special characters, or random words in your nickname.
          </p>
        </div>
    
        <div class="modal-footer">
          <button id="profile-save-btn">Save</button>
        </div>
      </div>
    </div>

    
    <button id="logout-btn">Logout</button>
  </div>
</div>
