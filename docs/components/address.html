<div id="address" class="settings-section">
  <h2>Address</h2>
  <p class="profile-desc">Manage your address details. Add, edit, or remove addresses easily.</p>

  <!-- 地址输入卡片 -->
  <div class="address-form card">
    <div class="form-item">
      <input type="text" id="country" placeholder="Country / Region">
    </div>
    <div class="form-item">
      <input type="text" id="state" placeholder="State / Province / Region">
    </div>
    <div class="form-item">
      <input type="text" id="city" placeholder="City">
    </div>
    <div class="form-item">
      <input type="text" id="street" placeholder="Street">
    </div>
    <div class="form-item">
      <input type="text" id="postal" placeholder="Postal Code (Optional)">
    </div>
    <button id="save-address-btn" class="save-btn">Save Address</button>
  </div>

  <!-- 已保存地址 -->
  <div class="saved-addresses">
    <h3>Saved Addresses</h3>
    <div id="saved-address-list" class="address-list">
      <p class="empty-text">No saved addresses yet.</p>
    </div>
  </div>
</div>
