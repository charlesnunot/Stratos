<div class="post-container">

  <!-- Content Input -->
  <textarea id="normal-content" placeholder="What's on your mind?"></textarea>

  <!-- Image Picker -->
  <div class="image-picker">
    <input type="file" id="normal-images" accept="image/*" multiple style="display:none;" />
    <div class="image-add-card">
      <span class="material-symbols-outlined">add</span>
    </div>
    <div class="image-preview" id="normal-preview"></div>
  </div>

  <!-- Tool Bar -->
  <div class="tool-bar">
    <div class="tool-item" id="tool-friends">
      <span class="material-symbols-outlined">alternate_email</span>
      <span>@Friends</span>
    </div>
    <div class="tool-item" id="tool-location">
      <span class="material-symbols-outlined">location_on</span>
      <span>Location</span>
    </div>
    <div class="tool-item" id="tool-visibility">
      <span class="material-symbols-outlined">public</span>
      <span>Public</span>
    </div>
  </div>

  <!-- Tags -->
  <div class="tags-container">
    <div id="tags-display"></div>
    <input type="text" id="post-tags" placeholder="Add tags..." />
  </div>

  <!-- Submit -->
  <div class="submit-area">
    <button id="normal-submit">Publish</button>
    <span id="normal-feedback"></span>
  </div>

</div>

<script>
  const addCard = document.querySelector('.image-add-card');
  const fileInput = document.querySelector('#normal-images');
  const previewContainer = document.querySelector('#normal-preview');

  // 当前选中的文件数组
  let selectedFiles = [];

  // 点击加号触发文件选择
  addCard.addEventListener('click', () => fileInput.click());

  // 文件选择事件
  fileInput.addEventListener('change', () => {
    const files = Array.from(fileInput.files);
    selectedFiles = files.slice(0, 4); // 限制最多 4 张
    renderPreviews();
  });

  // 渲染预览
  function renderPreviews() {
    previewContainer.innerHTML = '';

    selectedFiles.forEach((file, index) => {
      const reader = new FileReader();
      reader.onload = e => {
        const wrapper = document.createElement('div');
        wrapper.className = 'preview-wrapper';

        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'preview-img';

        const delBtn = document.createElement('button');
        delBtn.className = 'preview-del';
        delBtn.textContent = '×';
        delBtn.addEventListener('click', () => {
          selectedFiles.splice(index, 1);
          renderPreviews();
        });

        wrapper.appendChild(img);
        wrapper.appendChild(delBtn);
        previewContainer.appendChild(wrapper);
      };
      reader.readAsDataURL(file);
    });
  }

  // 获取当前选中的文件（可用于上传）
  function getSelectedFiles() {
    return selectedFiles;
  }

  // 提交示例
  document.querySelector('#normal-submit').addEventListener('click', async () => {
    const filesToUpload = getSelectedFiles();
    console.log('要上传的图片文件:', filesToUpload);
    // TODO: 调用上传 API 上传这些文件
  });
</script>
