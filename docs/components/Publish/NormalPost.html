<link
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
  rel="stylesheet"
/>

<div class="normal-post-container">

  <!-- 内容输入 -->
  <div class="content-card">
    <textarea
      id="normal-content"
      placeholder="What's on your mind?"
    ></textarea>
  </div>

  <!-- 图片选择 -->
  <div class="image-picker-scroll" id="image-picker">
    <div class="image-add-card" id="add-image">
      <span class="material-symbols-outlined">add</span>
    </div>
  </div>

  <!-- 功能工具栏 -->
  <div class="post-tools">
    <div class="tool-card" id="tool-friends">
      <span class="material-symbols-outlined">alternate_email</span>
      <span>Friends</span>
    </div>

    <div class="tool-card" id="tool-location">
      <span class="material-symbols-outlined">location_on</span>
      <span>Location</span>
    </div>

    <div class="tool-card" id="tool-visibility">
      <span class="material-symbols-outlined">public</span>
      <span>Public</span>
    </div>

    <input type="text" id="post-tags" placeholder="#tags" />
  </div>

  <!-- 发布按钮 -->
  <div class="post-submit">
    <button id="normal-submit">Publish</button>
    <span id="normal-feedback"></span>
  </div>

</div>
