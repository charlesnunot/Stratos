<div class="post-container">

  <!-- Content Input -->
  <textarea id="normal-content" placeholder="What's on your mind?"></textarea>

  <!-- Image Picker -->
  <div class="image-picker">
    <input type="file" id="normal-images" accept="image/*" multiple style="display:none;" />
    <div class="image-add-card">
      <span class="material-symbols-outlined">add</span>
    </div>
    <div class="image-preview" id="normal-preview"></div>
  </div>

  <!-- Tool Bar -->
  <div class="tool-bar">
    <div class="tool-item" id="tool-friends">
      <span class="material-symbols-outlined">alternate_email</span>
      <span>@Friends</span>
    </div>
    <div class="tool-item" id="tool-location">
      <span class="material-symbols-outlined">location_on</span>
      <span>Location</span>
    </div>
    <div class="tool-item" id="tool-visibility">
      <span class="material-symbols-outlined">public</span>
      <span>Public</span>
    </div>
  </div>

  <!-- Tags -->
  <div class="tags-container">
    <div id="tags-display"></div>
    <input type="text" id="post-tags" placeholder="Add tags..." />
  </div>

  <!-- Submit -->
  <div class="submit-area">
    <button id="normal-submit">Publish</button>
    <span id="normal-feedback"></span>
  </div>

</div>

<script>
  const addCard = document.querySelector('.image-add-card');
  const fileInput = document.querySelector('#normal-images');
  const previewContainer = document.querySelector('#normal-preview');

  addCard.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    previewContainer.innerHTML = '';
    const files = fileInput.files;
    if (!files) return;
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.className = 'preview-img';
        previewContainer.appendChild(img);
      };
      reader.readAsDataURL(file);
    });
  });
</script>
