<!-- docs/components/Publish/ProductPost.html -->
<div class="product-post-container">
  <h3>Create a Product Post</h3>
  
  <label for="product-title">Title:</label>
  <input type="text" id="product-title" placeholder="Product title" />

  <label for="product-description">Description:</label>
  <textarea id="product-description" placeholder="Product description" rows="4"></textarea>

  <label for="product-price">Price:</label>
  <input type="number" id="product-price" placeholder="0.00" />

  <button id="product-submit">Publish</button>
  <div id="product-feedback"></div>
</div>
