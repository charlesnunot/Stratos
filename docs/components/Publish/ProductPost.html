<div class="post-container">

  <!-- 内容输入 -->
  <textarea id="normal-content" placeholder="Write something about your product..."></textarea>

  <!-- 图片选择 -->
  <div class="image-picker">
    <div class="image-add-card">
      <span class="material-symbols-outlined">add</span>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="tool-bar">
    <div class="tool-item" id="tool-friends">
      <span class="material-symbols-outlined">alternate_email</span>
      <span>@Friends</span>
    </div>
    <div class="tool-item" id="tool-location">
      <span class="material-symbols-outlined">location_on</span>
      <span>Location</span>
    </div>
    <div class="tool-item" id="tool-visibility">
      <span class="material-symbols-outlined">public</span>
      <span>Public</span>
    </div>
    <div class="tool-item" id="tool-product-info">
      <span class="material-symbols-outlined">inventory_2</span>
      <span>Product Info</span>
    </div>
  </div>

  <!-- Product Info -->
  <div class="product-info">
    <input type="text" id="product-title" placeholder="Product Title" />
    <textarea id="product-description" placeholder="Product Description"></textarea>
    <input type="number" id="product-price" placeholder="Price (USD)" />
    <input type="number" id="product-stock" placeholder="Stock Quantity" />
    <input type="text" id="product-shipping" placeholder="Shipping Fee" />
    <input type="text" id="product-link" placeholder="Product Link" />
    <select id="product-condition">
      <option value="new">New</option>
      <option value="used">Used</option>
    </select>
  </div>

  <!-- Tags -->
  <div class="tags-container">
    <div id="tags-display"></div>
    <input type="text" id="post-tags" placeholder="Add tags..." />
  </div>

  <!-- 发布按钮 -->
  <div class="submit-area">
    <button id="normal-submit">Publish</button>
    <span id="normal-feedback"></span>
  </div>

</div>
