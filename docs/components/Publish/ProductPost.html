<div class="product-post-container">
  <h3>Create a Product Post</h3>
  <input id="product-title" type="text" placeholder="Product Title" />
  <textarea id="product-description" placeholder="Product Description" rows="4"></textarea>
  <input id="product-price" type="number" placeholder="Price" />
  <button id="product-submit">Publish Product</button>
  <div id="product-feedback"></div>
</div>
