<!-- profile.html -->
<div id="profile" class="settings-section">
  <h2>Profile</h2>
  <p class="profile-desc">
    Manage your personal information. These details help personalize your Stratos experience.
  </p>

  <div class="card">

    <div class="card-item">
      <div class="left">
        <div class="label">Nickname</div>
        <div class="value" id="profile-nickname">Loading...</div>
      </div>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

    <div class="card-item">
      <div class="left">
        <div class="label">Region</div>
        <div class="value" id="profile-region">Loading...</div>
      </div>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

    <div class="card-item">
      <div class="left">
        <div class="label">Occupation</div>
        <div class="value" id="profile-occupation">Loading...</div>
      </div>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

    <div class="card-item">
      <div class="left">
        <div class="label">School</div>
        <div class="value" id="profile-school">Loading...</div>
      </div>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

    <div class="card-item">
      <div class="left">
        <div class="label">Gender</div>
        <div class="value" id="profile-gender">Loading...</div>
      </div>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

    <div class="card-item">
      <div class="left">
        <div class="label">Birthday</div>
        <div class="value" id="profile-birthday">Loading...</div>
      </div>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

    <div class="card-item">
      <div class="left">
        <div class="label">Bio</div>
        <div class="value" id="profile-bio">Loading...</div>
      </div>
      <i class="fas fa-chevron-right arrow"></i>
    </div>

  </div>
</div>
