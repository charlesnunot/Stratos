<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Stratos</title>
<style>
  body { margin:0; font-family:Arial,sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#FAFAFA;}
  .register-container { background:#fff; padding:24px; border-radius:12px; display:flex; flex-direction:column; gap:12px; width:320px;}
  .register-container input { padding:8px; border-radius:8px; border:1px solid #E0E0E0; width:100%; box-sizing:border-box;}
  .password-wrapper { position: relative; display: flex; align-items: center; }
  .password-wrapper input { flex: 1; }
  .toggle-password { position: absolute; right: 10px; cursor: pointer; color:#888; user-select:none; }
  .register-container button { padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-size:16px; color:#fff; background:#1DA1F2;}
  .register-container button:hover{ background:#1A91DA; }
  .switch-link { color:#1DA1F2; cursor:pointer; text-decoration:underline; font-size:14px; text-align:center; }
  .message { text-align:center; color:red; font-size:14px; margin-bottom:8px; }
</style>
</head>
<body>
  <div class="register-container">
    <h2>Register</h2>
    <input type="email" id="reg-email" placeholder="Email">
    <div class="password-wrapper">
      <input type="password" id="reg-password" placeholder="Password">
      <span class="toggle-password" id="toggle-password">Show</span>
    </div>
    <div class="message" id="message"></div>
    <button id="register-btn">Register</button>
    <span class="switch-link" id="to-login">Go to Login</span>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // 替换为你的 Supabase 项目 URL 和匿名 key
    const supabaseUrl = "https://zquslphbmowkgrdlygza.supabase.co";
    const supabaseAnonKey = "sb_publishable_oaojowgzWjzLUAUhA7rjfw_hntjdrcu";

    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    const togglePassword = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('reg-password');
    const messageDiv = document.getElementById('message');

    togglePassword.addEventListener('click', () => {
      passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
      togglePassword.textContent = passwordInput.type === 'password' ? 'Show' : 'Hide';
    });

    document.getElementById('to-login').addEventListener('click', () => {
      window.location.href = 'login.html';
    });

    function validateRegister(email, password) {
      if (!email) return { valid: false, message: 'Please enter email' };
      if (!/^\S+@\S+\.\S+$/.test(email)) return { valid: false, message: 'Invalid email format' };
      if (!password) return { valid: false, message: 'Please enter password' };
      if (password.length < 6) return { valid: false, message: 'Password must be at least 6 characters' };
      return { valid: true };
    }

    document.getElementById('register-btn').addEventListener('click', async () => {
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value.trim();
      messageDiv.style.color = "red";

      const validation = validateRegister(email, password);
      if (!validation.valid) {
        messageDiv.textContent = validation.message;
        return;
      }

      // 调用 Supabase Auth 注册用户
      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
      });

      if (error) {
        messageDiv.textContent = error.message;
        return;
      }

      messageDiv.style.color = "green";
      messageDiv.textContent = "Registration successful! Please check your email to verify.";
      setTimeout(() => window.location.href = "login.html", 2000);
    });
  </script>
</body>
</html>
