<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Profile</title>

  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/user.css">
</head>
<body>

  <div class="layout">

    <!-- 左侧 Sidebar -->
    <div class="sidebar-wrapper" id="sidebar-container">
      <!-- sidebar.html 会动态加载 -->
    </div>

    <!-- 竖线 -->
    <div class="divider"></div>

    <!-- 右侧用户页面 -->
    <div class="user-page" id="user-page">
      <h1>User Profile</h1>
      <p>Welcome to your profile page. You can edit your details here.</p>
      <div class="user-info">
        <p><strong>Username:</strong> JohnDoe</p>
        <p><strong>Email:</strong> john@example.com</p>
        <p><strong>Member since:</strong> 2025-01-01</p>
      </div>
      <button>Edit Profile</button>
    </div>

  </div>

  <script type="module">
    fetch('components/sidebar.html')
      .then(r => r.text())
      .then(html => {
        const container = document.getElementById('sidebar-container');
        container.innerHTML = html;

        const moreBtn = container.querySelector('#more-button');
        const moreMenu = container.querySelector('#more-menu');

        if (moreBtn && moreMenu) {
          moreBtn.addEventListener('click', () => {
            moreMenu.classList.toggle('show');
            moreBtn.classList.toggle('active');
          });
        }
      });
  </script>
</body>
</html>
