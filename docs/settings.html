<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratos Web Homepage</title>
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="brand">Stratos</div>
    <button>Home</button>
    <button>Search</button>
    <button>Explore</button>
    <button>Marketplace</button>
    <button>Create</button>
    <button>Messages</button>

    <!-- More Button -->
    <div class="more-button" id="more-button">
      <i class="fas fa-bars"></i> More
    </div>

    <!-- More Menu -->
    <div class="more-menu" id="more-menu">
      <a href="settings.html" id="settings"><i class="fas fa-cogs"></i> Settings</a>
      <a href="#" id="report-issue"><i class="fas fa-exclamation-circle"></i> Report Issue</a>
      <a href="#" id="switch-account"><i class="fas fa-sync-alt"></i> Switch Account</a>
      <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </div>

  <!-- Center content -->
  <div class="center-container-settings">
    <div class="main-content">
      <h1>Home Feed</h1>
      <div class="post"><h3>User A's Post</h3><p>Sample content...</p></div>
      <div class="post"><h3>User B's Post</h3><p>Sample content...</p></div>
    </div>
  </div>

  <!-- Right panel container -->
  <div class="right-panel-container">
    <div class="right-panel" id="right-panel-1">
      <div class="app-download">
        <h3>Download Stratos App</h3>
        <button>iOS</button>
        <button>Android</button>
      </div>
    </div>
    <div class="right-panel" id="right-panel-2">
      <div class="user-info" id="user-info" style="display:none;">
        <img id="user-avatar" src="https://via.placeholder.com/60" alt="User Avatar">
        <span id="username"></span>
        <div class="notifications">
          <p>New message: User C commented on your post</p>
          <p>Friend online: User D</p>
          <p>System notification: Event starting soon</p>
        </div>
        <button id="logout-btn">Logout</button>
      </div>
    </div>
  </div>

  <!-- 引入 Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- 删除自定义 auth.js 引用 -->
  <!-- <script src="js/auth.js"></script> -->

</body>
</html>
