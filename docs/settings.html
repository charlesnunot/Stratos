<!-- docs/settings.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Stratos</title>
  <!-- 主样式 -->
  <link rel="stylesheet" href="css/settings.css">
  <!-- Profile 页面专属样式 -->
  <link rel="stylesheet" href="css/settings-profile.css">
  <!-- address 页面专属样式 -->
  <link rel="stylesheet" href="css/settings-address.css">
  <!-- subscription 页面专属样式 -->
  <link rel="stylesheet" href="css/settings-subscription.css">
  <!-- privacy 页面专属样式 -->
  <link rel="stylesheet" href="css/settings-privacy.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <div id="page-wrapper">
    <div id="settings-container">
      
      <!-- 左侧菜单 -->
      <div id="settings-menu">
        <div class="brand">Stratos</div>

        <a href="index.html" class="menu-item home-btn">
          <i class="fas fa-home icon"></i> Home
        </a>

        <div class="menu-category">Personal</div>
        <div class="menu-item" data-section="profile">Profile</div>
        <div class="menu-item" data-section="address">Address</div>
        <div class="menu-item" data-section="subscription">Subscription</div>

        <div class="menu-category">Privacy</div>
        <div class="menu-item" data-section="privacy">Privacy Settings</div>
        <div class="menu-item" data-section="logout">Logout</div>
        <div class="menu-item" data-section="delete-account">Delete Account</div>
      </div>

      <!-- 右侧内容 -->
      <div id="settings-content">
        <div id="settings-content">
          <div id="content-loader">Loading...</div>
        </div>
     
        <div id="address" class="settings-section" style="display:none;">
          <h2>Address</h2>
          <p>Manage your address details.</p>
        </div>

        <div id="subscription" class="settings-section" style="display:none;">
          <h2>Subscription</h2>
          <p>View or modify your subscription plan.</p>
        </div>

        <div id="privacy" class="settings-section" style="display:none;">
          <h2>Privacy Settings</h2>
          <p>Manage your privacy options.</p>
        </div>

        <div id="logout" class="settings-section" style="display:none;">
          <h2>Logout</h2>
          <button id="logout-btn">Logout</button>
        </div>

        <div id="delete-account" class="settings-section" style="display:none;">
          <h2>Delete Account</h2>
          <button id="delete-account-btn">Delete My Account</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="js/settings.js"></script>
</body>
</html>
