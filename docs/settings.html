<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Stratos Web</title>
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="brand">Stratos</div>
    <button>Home</button>
    <button>Search</button>
    <button>Explore</button>
    <button>Marketplace</button>
    <button>Create</button>
    <button>Messages</button>

    <!-- More Button -->
    <div class="more-button" id="more-button">
      <i class="fas fa-bars"></i> More
    </div>

    <!-- More Menu -->
    <div class="more-menu" id="more-menu">
      <a href="settings.html" id="settings"><i class="fas fa-cogs"></i> Settings</a>
      <a href="#" id="report-issue"><i class="fas fa-exclamation-circle"></i> Report Issue</a>
      <a href="#" id="switch-account"><i class="fas fa-sync-alt"></i> Switch Account</a>
      <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </div>

  <!-- Center content -->
  <div class="center-container">
    <div class="main-content">
      <h1>Settings</h1>
      <div class="setting-option">
        <h3>Change Email</h3>
        <input type="email" placeholder="Enter new email" />
      </div>
      <div class="setting-option">
        <h3>Change Password</h3>
        <input type="password" placeholder="Enter new password" />
      </div>
      <div class="setting-option">
        <h3>Notification Preferences</h3>
        <input type="checkbox" id="email-notifications" />
        <label for="email-notifications">Enable Email Notifications</label>
      </div>
      <div class="setting-option">
        <button>Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel" id="right-panel">
    <div class="app-download">
      <h3>Download Stratos App</h3>
      <button>iOS</button>
      <button>Android</button>
    </div>
    <div class="user-info" id="user-info" style="display:none;">
      <img id="user-avatar" src="https://via.placeholder.com/60" alt="User Avatar">
      <span id="username"></span>
      <div class="notifications">
        <p>New message: User C commented on your post</p>
        <p>Friend online: User D</p>
        <p>System notification: Event starting soon</p>
      </div>
      <button id="logout-btn">Logout</button>
    </div>
  </div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Custom Auth Script -->
  <script src="js/auth.js"></script>

</body>
</html>
