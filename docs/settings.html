<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Stratos Web</title>
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

  <!-- Sidebar and right panel -->
  <div id="sidebar-right-panel-container">
    <object type="text/html" data="sidebar-right-panel.html" width="100%" height="100%"></object>
  </div>

  <!-- Main content container -->
  <div class="center-container">
    <!-- Left 3/4 content -->
    <div class="main-content">
      <h1>Settings</h1>
      <div class="setting-option">
        <h3>Change Email</h3>
        <input type="email" placeholder="Enter new email" />
      </div>
      <div class="setting-option">
        <h3>Change Password</h3>
        <input type="password" placeholder="Enter new password" />
      </div>
      <div class="setting-option">
        <h3>Notification Preferences</h3>
        <input type="checkbox" id="email-notifications" />
        <label for="email-notifications">Enable Email Notifications</label>
      </div>
      <div class="setting-option">
        <button>Save Changes</button>
      </div>
    </div>

    <!-- New 1/4 content (for example: profile picture, account info) -->
    <div class="side-content">
      <h3>Profile Picture</h3>
      <input type="file" id="avatar" />
      <h3>Account Information</h3>
      <div class="info">
        <p><strong>Username:</strong> <span id="username">User</span></p>
        <p><strong>Email:</strong> <span id="user-email">user@example.com</span></p>
      </div>
    </div>
  </div>

  <!-- Supabase UMD -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Custom Auth Script -->
  <script src="js/settings.js"></script>

</body>
</html>
